version: '3.8'

services:
  redis:
    image: redis/redis-stack:latest
    container_name: redis_cache
    ports:
      - "6379:6379"   # Redis
      - "8001:8001"   # RedisInsight web UI
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning

volumes:
  redis_data:
